# Nginx Configuration for HyperSpeed Pro
# This configuration provides edge caching and HTTP/2/HTTP/3 support

# Main cache configuration
proxy_cache_path /var/cache/hyperspeed_pro/nginx levels=1:2 keys_zone=hyperspeed:100m max_size=10g inactive=60m use_temp_path=off;
proxy_cache_key "$scheme$request_method$host$request_uri";

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Upstream backend servers
upstream php_backend {
    least_conn;
    server 127.0.0.1:9000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Map to determine if request should be cached
map $request_uri $skip_cache {
    default 0;
    ~*/(wp-admin|administrator|login|cart|checkout|account) 1;
}

map $http_cookie $skip_cache_cookie {
    default 0;
    ~*(wordpress_logged_in|joomla_|drupal_) 1;
}

# Brotli compression
brotli on;
brotli_comp_level 6;
brotli_min_length 256;
brotli_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;

# Gzip compression (fallback)
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml;

# Server block example
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    # HTTP/3 support
    listen 443 quic reuseport;
    listen [::]:443 quic reuseport;
    
    server_name example.com;
    root /home/user/public_html;
    index index.php index.html;
    
    # SSL Configuration
    ssl_certificate /etc/ssl/certs/example.com.crt;
    ssl_certificate_key /etc/ssl/private/example.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # QUIC/HTTP3 headers
    add_header Alt-Svc 'h3=":443"; ma=86400';
    add_header QUIC-Status $quic;
    
    # HyperSpeed Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" always;
    
    # Rate limiting
    limit_req zone=general burst=200 nodelay;
    limit_conn addr 10;
    
    # Hide server information
    server_tokens off;
    more_clear_headers Server;
    
    # Client settings
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    
    # Timeouts
    keepalive_timeout 65;
    send_timeout 60;
    
    # Caching configuration
    location / {
        try_files $uri $uri/ /index.php?$args;
        
        # Proxy cache
        proxy_cache hyperspeed;
        proxy_cache_bypass $skip_cache $skip_cache_cookie;
        proxy_no_cache $skip_cache $skip_cache_cookie;
        proxy_cache_valid 200 301 302 60m;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        
        # Cache headers
        add_header X-Cache-Status $upstream_cache_status;
        add_header X-HyperSpeed "Active";
    }
    
    # PHP processing
    location ~ \.php$ {
        fastcgi_pass php_backend;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # FastCGI cache
        fastcgi_cache hyperspeed;
        fastcgi_cache_bypass $skip_cache $skip_cache_cookie;
        fastcgi_no_cache $skip_cache $skip_cache_cookie;
        fastcgi_cache_valid 200 60m;
        fastcgi_cache_use_stale error timeout updating invalid_header http_500;
        fastcgi_cache_background_update on;
        fastcgi_cache_lock on;
        
        # Performance settings
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_temp_file_write_size 256k;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 180;
        fastcgi_read_timeout 180;
        
        add_header X-Cache-Status $upstream_cache_status;
        add_header X-HyperSpeed "Active";
    }
    
    # Static file caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-HyperSpeed "Static";
        access_log off;
        log_not_found off;
    }
    
    # Security - deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Deny access to configuration files
    location ~* (\.conf|\.ini|\.log|\.sql|\.bak)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name example.com;
    
    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}
