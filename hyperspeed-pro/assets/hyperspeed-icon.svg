<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffed4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bgGrad)"/>
  
  <!-- Outer glow circle -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
  
  <!-- Lightning bolt - main icon -->
  <path d="M 35 10 L 20 34 L 30 34 L 27 54 L 44 28 L 34 28 Z" 
        fill="url(#boltGrad)" 
        stroke="#ffffff" 
        stroke-width="2" 
        stroke-linejoin="round"
        filter="url(#glow)"/>
  
  <!-- Speed lines (right side) -->
  <g opacity="0.9">
    <line x1="46" y1="14" x2="52" y2="14" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="48" y1="20" x2="56" y2="20" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="47" y1="26" x2="54" y2="26" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Mini rocket particles (acceleration effect) -->
  <circle cx="12" cy="18" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="14" cy="24" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="10" cy="30" r="1.5" fill="#ffffff" opacity="0.4"/>
  
  <!-- Border highlight -->
  <rect width="64" height="64" rx="12" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  
  <!-- WHM badge indicator (small) -->
  <circle cx="52" cy="52" r="8" fill="#10b981" stroke="#ffffff" stroke-width="2"/>
  <text x="52" y="56" font-family="Arial, sans-serif" font-size="10" font-weight="bold" 
        fill="#ffffff" text-anchor="middle">W</text>
</svg>
