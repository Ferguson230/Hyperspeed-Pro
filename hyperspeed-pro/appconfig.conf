# HyperSpeed Pro WHM Plugin - AppConfig Registration
# Format: key=value pairs (required by register_appconfig)
# Reference: https://api.docs.cpanel.net/guides/guide-to-whm-plugins/guide-to-whm-plugins-appconfig-configuration-file

# The service that will serve the application
service=whostmgr

# url: path of the plugin relative to the WHM docroot (must start with /)
# Physical file: /usr/local/cpanel/whostmgr/docroot/cgi/hyperspeed_pro/index.cgi
url=/cgi/hyperspeed_pro/index.cgi

# entryurl: the URL fragment that WHM builds into the nav link.
# WHM base URL is https://host:2087/cpsessXXX/
# The CGI is accessed at https://host:2087/cpsessXXX/cgi/hyperspeed_pro/index.cgi
# So entryurl must NOT include 'cgi/' - WHM routes /cgi/ to the cgi docroot dir
entryurl=hyperspeed_pro/index.cgi

# Display name shown in WHM navigation
displayname=HyperSpeed Pro

# Icon filename (must exist in /usr/local/cpanel/whostmgr/docroot/addon_plugins/)
icon=hyperspeed-icon.png

# ACLs required - 'any' allows all authenticated WHM users
acls=any

# Open in same tab
target=_self

# Search keywords (available in cPanel WHM v132+)
searchtext=HyperSpeed performance caching optimization acceleration security speed
